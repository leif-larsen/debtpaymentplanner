services:
  # Local development — Vite dev server only (hot reload).
  # Run the API separately: npm run dev:server
  app:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules   # prevent host node_modules from overriding container's
    environment:
      - NODE_ENV=development

  # Production — Hono server serves both the API and the built frontend.
  app-prod:
    build:
      context: .
      target: prod
    ports:
      - "4759:4759"
    volumes:
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4759
      - DB_PATH=/app/data/db.sqlite
    restart: unless-stopped
    profiles:
      - prod

volumes:
  db-data:
